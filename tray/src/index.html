<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Usage</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #e8e6e1;
      width: 320px;
      overflow-x: hidden;
      user-select: none;
    }

    .header {
      padding: 12px 14px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2a2a2a;
    }

    .header h1 {
      font-size: 13px;
      font-weight: 600;
      color: #faf9f5;
    }

    .refresh-btn {
      background: none;
      border: 1px solid #3a3a3a;
      color: #a3a3a0;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
    }

    .refresh-btn:hover { border-color: #5a5a5a; color: #e8e6e1; }
    .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .accounts {
      padding: 6px 0;
      max-height: 440px;
      overflow-y: auto;
    }

    .accounts::-webkit-scrollbar { width: 4px; }
    .accounts::-webkit-scrollbar-track { background: transparent; }
    .accounts::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 2px; }

    .card {
      padding: 10px 14px;
      border-bottom: 1px solid #222;
    }

    .card:last-child { border-bottom: none; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .account-name {
      font-size: 12px;
      font-weight: 600;
      color: #faf9f5;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
    }

    .status-dot.error { background: #ef4444; }

    .usage-section { margin-bottom: 6px; }
    .usage-section:last-child { margin-bottom: 0; }

    .usage-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 3px;
    }

    .usage-label .label {
      font-size: 10px;
      color: #a3a3a0;
      font-weight: 500;
    }

    .usage-label .value {
      font-size: 11px;
      font-weight: 600;
      color: #faf9f5;
    }

    .bar-container {
      width: 100%;
      height: 6px;
      background: transparent;
      border: 1px solid #787877;
      border-radius: 4px;
      overflow: visible;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      border-radius: 3px 0 0 3px;
      transition: width 0.4s ease;
      background: #2c84db;
    }

    .bar-fill.full { border-radius: 3px; }
    .bar-fill.warn { background: #ce2029; }

    .bar-marker {
      position: absolute;
      top: -2px;
      bottom: -2px;
      width: 2px;
      background: #fff;
      pointer-events: none;
    }

    .reset-text {
      font-size: 9px;
      color: #787877;
      margin-top: 2px;
    }

    .error-text {
      font-size: 10px;
      color: #ef4444;
      margin-top: 3px;
    }

    .no-data {
      text-align: center;
      color: #787877;
      padding: 6px 0;
      font-size: 11px;
    }

    .loading {
      text-align: center;
      color: #787877;
      padding: 40px 0;
      font-size: 13px;
    }

    .footer {
      padding: 6px 14px;
      border-top: 1px solid #2a2a2a;
      font-size: 9px;
      color: #555;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Claude Usage</h1>
    <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">Refresh</button>
  </div>
  <div class="accounts" id="accounts">
    <div class="loading">Loading...</div>
  </div>
  <div class="footer" id="footer">Auto-refresh: 5m</div>

  <script>
    let accounts = [];

    function formatCountdown(timestampMs) {
      const diffMs = timestampMs - Date.now();
      if (diffMs <= 0) return '0m';
      const totalMinutes = Math.round(diffMs / (1000 * 60));
      if (totalMinutes < 60) return totalMinutes + 'm';
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;
      if (hours < 24) return hours + 'h ' + minutes + 'm';
      const days = Math.floor(hours / 24);
      const remHours = hours % 24;
      return days + 'd ' + remHours + 'h';
    }

    function calcWindowMarker(resetsAt, windowMs) {
      if (!resetsAt) return null;
      const resetMs = Date.parse(resetsAt);
      const windowStartMs = resetMs - windowMs;
      const now = Date.now();
      const total = resetMs - windowStartMs;
      const elapsed = Math.max(0, Math.min(total, now - windowStartMs));
      return total > 0 ? (elapsed / total) * 100 : 0;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function renderCard(account) {
      const { name, usage, error } = account;
      const hasError = !!error;
      const hasUsage = !!usage;
      let sections = '';

      if (hasUsage) {
        if (usage.five_hour) {
          const u = usage.five_hour;
          const pct = Math.round(u.utilization * 10) / 10;
          const width = Math.max(0, Math.min(100, u.utilization));
          const warn = width >= 90 ? ' warn' : '';
          const full = width >= 99.5 ? ' full' : '';
          const resetText = u.resets_at ? 'Resets ' + formatCountdown(Date.parse(u.resets_at)) : '';
          const markerPct = calcWindowMarker(u.resets_at, 5 * 60 * 60 * 1000);
          const markerHtml = markerPct !== null ? '<div class="bar-marker" style="left:' + markerPct + '%"></div>' : '';

          sections += '<div class="usage-section">' +
            '<div class="usage-label"><span class="label">Session (5h)</span><span class="value">' + pct + '%</span></div>' +
            '<div class="bar-container"><div class="bar-fill' + warn + full + '" style="width:' + width + '%"></div>' + markerHtml + '</div>' +
            (resetText ? '<div class="reset-text">' + resetText + '</div>' : '') +
            '</div>';
        }
        if (usage.seven_day) {
          const u = usage.seven_day;
          const pct = Math.round(u.utilization * 10) / 10;
          const width = Math.max(0, Math.min(100, u.utilization));
          const warn = width >= 90 ? ' warn' : '';
          const full = width >= 99.5 ? ' full' : '';
          const resetDate = u.resets_at ? new Date(u.resets_at) : null;
          const resetText = resetDate ? 'Resets ' + formatCountdown(resetDate.getTime()) : '';
          const markerPct = calcWindowMarker(u.resets_at, 7 * 24 * 60 * 60 * 1000);
          const markerHtml = markerPct !== null ? '<div class="bar-marker" style="left:' + markerPct + '%"></div>' : '';

          sections += '<div class="usage-section">' +
            '<div class="usage-label"><span class="label">Weekly (7d)</span><span class="value">' + pct + '%</span></div>' +
            '<div class="bar-container"><div class="bar-fill' + warn + full + '" style="width:' + width + '%"></div>' + markerHtml + '</div>' +
            (resetText ? '<div class="reset-text">' + resetText + '</div>' : '') +
            '</div>';
        }
      }

      if (!hasUsage && !hasError) {
        sections = '<div class="no-data">No usage data</div>';
      }

      const errorHtml = hasError ? '<div class="error-text">' + escapeHtml(error) + '</div>' : '';

      return '<div class="card">' +
        '<div class="card-header"><span class="account-name">' + escapeHtml(name) + '</span>' +
        '<span class="status-dot' + (hasError && !hasUsage ? ' error' : '') + '"></span></div>' +
        sections + errorHtml + '</div>';
    }

    function render() {
      const container = document.getElementById('accounts');
      if (accounts.length === 0) {
        container.innerHTML = '<div class="loading">No accounts configured</div>';
        return;
      }
      const sorted = [...accounts].sort((a, b) => a.name.localeCompare(b.name));
      container.innerHTML = sorted.map(renderCard).join('');
    }

    async function fetchUsage() {
      try {
        const result = await window.__TAURI__.core.invoke('get_usage');
        accounts = result;
        render();
      } catch (e) {
        console.error('Failed to get usage:', e);
      }
    }

    async function manualRefresh() {
      const btn = document.getElementById('refreshBtn');
      btn.disabled = true;
      btn.textContent = '...';
      try {
        const result = await window.__TAURI__.core.invoke('refresh_usage');
        accounts = result;
        render();
      } catch (e) {
        console.error('Refresh failed:', e);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Refresh';
      }
    }

    // Called from Rust when data updates
    window.onUsageUpdate = function() {
      fetchUsage();
    };

    // Re-render every second to update countdowns
    setInterval(() => {
      if (accounts.length > 0) render();
    }, 1000);

    // Initial load
    fetchUsage();
  </script>
</body>
</html>
